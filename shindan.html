<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>COREタイプ診断 | VISUAL LABO 新橋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --ink:        #1c1a16;
      --ink-soft:   #2a2820;
      --cream:      #f5f0e8;
      --cream-dim:  #ede8df;
      --cream-lt:   #faf7f1;
      --gold:       #c4a36a;
      --gold-lt:    #d4b87e;
      --gold-dim:   rgba(196,163,106,0.18);
      --muted:      #8a7d65;
      --border:     rgba(196,163,106,0.28);
      --white:      #fdfaf5;
      --result-bg:  #26201a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--cream-lt);
      color: var(--ink);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREEN SYSTEM ── */
    .screen { display: none; min-height: 100dvh; width: 100%; flex-direction: column; }
    .screen.active { display: flex; }

    /* ════════════════════════════════════════════
       INTRO
    ════════════════════════════════════════════ */
    #intro {
      background: var(--cream-lt);
      justify-content: center;
      align-items: center;
      padding: 48px 28px;
      position: relative;
      overflow: hidden;
    }

    /* subtle radial glow */
    #intro::before {
      content: '';
      position: absolute;
      top: -20%;  right: -15%;
      width: 55vmax; height: 55vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,163,106,0.13) 0%, transparent 68%);
      pointer-events: none;
    }
    #intro::after {
      content: '';
      position: absolute;
      bottom: -15%; left: -10%;
      width: 40vmax; height: 40vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,163,106,0.08) 0%, transparent 68%);
      pointer-events: none;
    }

    .intro-wrap {
      max-width: 520px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .vl-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp .5s ease-out .15s forwards;
    }
    .vl-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .25em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .vl-line { flex: 1; height: 1px; background: var(--border); }

    .intro-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: .18em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp .5s ease-out .3s forwards;
    }

    .intro-h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(38px, 9vw, 58px);
      font-weight: 900;
      line-height: 1.12;
      color: var(--ink);
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp .6s ease-out .45s forwards;
    }
    .intro-h1 em {
      font-style: normal;
      color: var(--gold);
    }

    .intro-ruled {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 28px 0;
      opacity: 0;
      transform-origin: left;
      animation: scaleX .45s cubic-bezier(.4,0,.2,1) .65s forwards;
    }

    .intro-lead {
      font-size: 14px;
      font-weight: 300;
      color: rgba(26,22,18,.62);
      line-height: 1.95;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp .55s ease-out .75s forwards;
    }

    .intro-meta {
      font-size: 11px;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp .5s ease-out .88s forwards;
    }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 40px;
      background: var(--gold);
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .08em;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .15s;
      opacity: 0;
      animation: fadeUp .5s ease-out 1s forwards;
    }
    .btn-start svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }
    .btn-start:hover { background: var(--gold-lt); transform: translateX(4px); }
    .btn-start:active { transform: translateX(2px); }

    /* axis preview chips */
    .axis-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp .5s ease-out 1.12s forwards;
    }
    .axis-chip {
      padding: 5px 12px;
      border: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ════════════════════════════════════════════
       QUIZ
    ════════════════════════════════════════════ */
    #quiz {
      background: var(--cream);
      color: var(--ink);
    }

    .quiz-top {
      background: var(--cream);
      padding: 20px 28px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* Progress bar with axis segments */
    .progress-track {
      height: 2px;
      background: rgba(0,0,0,.1);
      width: 100%;
      position: relative;
      margin-bottom: 14px;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }
    .progress-segments {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
    }
    .progress-seg {
      flex: 1;
      height: 100%;
      border-right: 2px solid var(--cream);
    }
    .progress-seg:last-child { border-right: none; }

    .quiz-axis-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .axis-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .axis-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }
    .axis-badge-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }
    .q-count {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .06em;
    }

    /* Question area */
    .quiz-body {
      flex: 1;
      position: relative;
      padding: 0 28px;
      overflow: hidden;
      /* min-height so transitions don't collapse */
      min-height: 420px;
    }

    .q-wrap {
      position: absolute;
      top: 40px;
      left: 28px;
      right: 28px;
      transition: transform .34s cubic-bezier(.4,0,.2,1), opacity .34s ease;
    }
    .q-wrap.entering  { transform: translateX(60px);  opacity: 0; }
    .q-wrap.active    { transform: translateX(0);      opacity: 1; }
    .q-wrap.leaving   { transform: translateX(-60px);  opacity: 0; }

    .q-text {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(19px, 4.8vw, 26px);
      font-weight: 700;
      line-height: 1.6;
      color: var(--ink);
      margin-bottom: 32px;
    }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .opt-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 20px;
      background: var(--white);
      border: 1.5px solid rgba(0,0,0,.09);
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      text-align: left;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .12s;
    }
    .opt-btn span.arrow {
      flex-shrink: 0;
      margin-left: 12px;
      font-size: 16px;
      opacity: .2;
      transition: opacity .15s, transform .15s;
      font-family: sans-serif;
    }
    .opt-btn:hover {
      border-color: var(--gold);
      background: rgba(196,163,106,.06);
      transform: translateX(5px);
    }
    .opt-btn:hover .arrow { opacity: .8; transform: translateX(3px); }
    .opt-btn:active { transform: translateX(3px); }

    /* ════════════════════════════════════════════
       RESULT
    ════════════════════════════════════════════ */
    #result {
      background: var(--result-bg);
      color: var(--cream);
    }

    .result-top {
      padding: 64px 28px 0;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    .result-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: .28em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .result-code-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: .32em;
      color: rgba(196,163,106,.35);
      margin-bottom: 10px;
    }

    .result-name {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(34px, 8.5vw, 52px);
      font-weight: 900;
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .result-short {
      font-size: 13px;
      color: rgba(245,240,232,.45);
      letter-spacing: .03em;
      line-height: 1.6;
    }

    /* axis breakdown badges */
    .result-axes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .axis-result-chip {
      padding: 4px 10px;
      border: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: .1em;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
    }
    .axis-result-chip.negative {
      background: var(--gold-dim);
      border-color: var(--gold);
    }

    .result-sep {
      max-width: 560px;
      margin: 36px auto;
      padding: 0 28px;
    }
    .result-sep-line {
      height: 1px;
      background: var(--border);
    }

    .result-body {
      padding: 0 28px 80px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    .r-section { margin-bottom: 28px; }

    .r-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .r-reason {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(245,240,232,.75);
    }

    .r-card {
      border: 1px solid var(--border);
      padding: 18px 20px;
      margin-bottom: 10px;
      background: rgba(255,255,255,.03);
    }
    .r-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: .04em;
      margin-bottom: 6px;
    }
    .r-card-note {
      font-size: 13px;
      font-weight: 300;
      color: rgba(245,240,232,.55);
      line-height: 1.75;
    }

    .r-message {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(17px, 4vw, 21px);
      font-weight: 700;
      line-height: 1.65;
      text-align: center;
      color: var(--cream);
      padding: 28px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin: 32px 0;
    }

    .cta-stack { display: flex; flex-direction: column; gap: 10px; }

    .btn-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 17px;
      background: #06C755;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: .04em;
      transition: opacity .2s;
    }
    .btn-line:hover { opacity: .9; }

    .btn-book {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 17px;
      background: var(--gold);
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: .04em;
      transition: background .2s;
    }
    .btn-book:hover { background: var(--gold-lt); }

    .btn-share {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: rgba(245,240,232,.4);
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      letter-spacing: .08em;
      text-align: center;
      border: 1px solid rgba(245,240,232,.12);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-share:hover { border-color: rgba(245,240,232,.35); color: rgba(245,240,232,.7); }

    .retry-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: .06em;
      transition: color .2s;
    }
    .retry-link:hover { color: rgba(245,240,232,.5); }

    /* ── REVEAL ANIMATION ── */
    .reveal { opacity: 0; transform: translateY(18px); }
    .reveal.in { animation: fadeUp .5s ease-out forwards; }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleX {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 600px) {
      .intro-ruled { margin: 28px 0; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
  SCREEN 1: INTRO
══════════════════════════════════════════ -->
<section id="intro" class="screen active">
  <div class="intro-wrap">
    <div class="vl-mark">
      <span class="vl-logo">Visual Labo — Shimbashi</span>
      <span class="vl-line"></span>
    </div>

    <p class="intro-eyebrow">CORE Type Diagnosis</p>

    <h1 class="intro-h1">
      お腹が<br>痩せない<br><em>理由</em>、教えます。
    </h1>

    <div class="intro-ruled"></div>

    <p class="intro-lead">
      食事・運動・疲労・ストレス。<br>
      4つの軸から、あなたのお腹が<br>
      痩せない本当の原因を特定する。
    </p>
    <p class="intro-meta">16 CORE Types ／ 全16問 ／ 約2分</p>

    <button class="btn-start" onclick="startQuiz()">
      診断をはじめる
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>

    <div class="axis-chips">
      <span class="axis-chip">Food</span>
      <span class="axis-chip">Move</span>
      <span class="axis-chip">Fatigue</span>
      <span class="axis-chip">Stress</span>
    </div>
  </div>
</section>

<!-- ══════════════════════════════════════════
  SCREEN 2: QUIZ
══════════════════════════════════════════ -->
<section id="quiz" class="screen">
  <div class="quiz-top">
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      <div class="progress-segments">
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
      </div>
    </div>
    <div class="quiz-axis-row">
      <div class="axis-badge">
        <div class="axis-dot"></div>
        <span class="axis-badge-text" id="axis-label">食事・飲酒</span>
      </div>
      <span class="q-count" id="q-count">1 / 16</span>
    </div>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
</section>

<!-- ══════════════════════════════════════════
  SCREEN 3: RESULT
══════════════════════════════════════════ -->
<section id="result" class="screen">
  <div class="result-top">
    <p class="result-eyebrow reveal">Your CORE Type</p>
    <p class="result-code-line reveal" id="r-code"></p>
    <h2 class="result-name reveal" id="r-name"></h2>
    <p class="result-short reveal" id="r-short"></p>
    <div class="result-axes reveal" id="r-axes"></div>
  </div>

  <div class="result-sep"><div class="result-sep-line"></div></div>

  <div class="result-body">
    <div class="r-section reveal">
      <p class="r-label">Why — なぜ痩せないのか</p>
      <p class="r-reason" id="r-reason"></p>
    </div>

    <p class="r-message reveal" id="r-message"></p>

    <div class="r-section reveal">
      <p class="r-label">Recommendation — VISUAL LABOの提案</p>
      <div class="r-card">
        <p class="r-card-title" id="r-menu"></p>
        <p class="r-card-note" id="r-menu-note"></p>
      </div>
      <div class="r-card">
        <p class="r-card-title" style="font-size:14px;color:rgba(196,163,106,.6)">ホームケア</p>
        <p class="r-card-note" id="r-supp"></p>
      </div>
    </div>

    <div class="cta-stack reveal">
      <a href="https://lin.ee/visuallabo" class="btn-line" target="_blank">
        LINEで結果を受け取る・予約する
      </a>
      <a href="https://www.hotpepper.jp/strJ001318580/" class="btn-book" target="_blank">
        初回体験を予約する
      </a>
      <button class="btn-share" onclick="onShare()">
        結果をシェアする
      </button>
    </div>

    <p class="retry-link" onclick="onRetry()">もう一度診断する</p>
  </div>
</section>

<!-- ══════════════════════════════════════════
  SCRIPT
══════════════════════════════════════════ -->
<script>
/* ────────────────────────────────────────
   QUESTIONS  (16 questions, 4 per axis)
   axis: FOOD | MOVE | FAT | STR
   A = "negative" flag (乱れ / 少 / 疲 / 高)
   B = "positive"
──────────────────────────────────────── */
const QS = [
  // ── FOOD ──
  {
    axis:'FOOD', label:'食事・飲酒',
    q:'週に飲み会・会食・お酒の席に何回行きますか？',
    a:'週3回以上（ほぼ毎日飲んでいる）',
    b:'週2回以下'
  },
  {
    axis:'FOOD', label:'食事・飲酒',
    q:'昼・夜の食事は外食やコンビニが多いですか？',
    a:'週4回以上、外食・コンビニ中心',
    b:'週3回以下、自炊や管理できている'
  },
  {
    axis:'FOOD', label:'食事・飲酒',
    q:'夜21時以降に食事することがよくありますか？',
    a:'よくある（週3回以上）',
    b:'あまりない'
  },
  {
    axis:'FOOD', label:'食事・飲酒',
    q:'甘いもの・菓子・清涼飲料水を日常的に摂りますか？',
    a:'ほぼ毎日摂る',
    b:'ほとんど摂らない'
  },
  // ── MOVE ──
  {
    axis:'MOVE', label:'運動・活動量',
    q:'1日の歩数はどのくらいですか？',
    a:'5,000歩未満が多い',
    b:'5,000歩以上歩くことが多い'
  },
  {
    axis:'MOVE', label:'運動・活動量',
    q:'週1回以上、意図的な運動（ジム・ウォーキング等）をしていますか？',
    a:'ほとんどしていない',
    b:'している'
  },
  {
    axis:'MOVE', label:'運動・活動量',
    q:'デスクワーク中、3時間以上連続して座り続けることがよくある？',
    a:'よくある',
    b:'こまめに立つ・歩くようにしている'
  },
  {
    axis:'MOVE', label:'運動・活動量',
    q:'移動中はエスカレーター・エレベーターをよく使いますか？',
    a:'ほぼ使う',
    b:'階段を選ぶことが多い'
  },
  // ── FATIGUE ──
  {
    axis:'FAT', label:'疲労・回復',
    q:'朝起きたとき、体の疲れが残っていることが多いですか？',
    a:'ほぼ毎朝、疲れが残っている',
    b:'わりとスッキリ起きられる'
  },
  {
    axis:'FAT', label:'疲労・回復',
    q:'平均睡眠時間はどのくらいですか？',
    a:'6時間未満が多い',
    b:'6時間以上は確保できている'
  },

/* ────────────────────────────────────────
   STATE
──────────────────────────────────────── */
let curIdx = 0;
let answers = [];   // 0 = A (negative), 1 = B (positive)
let curWrap = null;
let lastCode = '';

/* ────────────────────────────────────────
   SCREEN UTILITIES
──────────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ────────────────────────────────────────
   START
──────────────────────────────────────── */
function startQuiz() {
  curIdx = 0;
  answers = [];
  curWrap = null;
  document.getElementById('quiz-body').innerHTML = '';
  showScreen('quiz');
  renderQ(0);
}

/* ────────────────────────────────────────
   RENDER QUESTION
──────────────────────────────────────── */
function renderQ(idx) {
  const q = QS[idx];
  const total = QS.length;
  const pct = (idx / total) * 100;

  // header
  document.getElementById('axis-label').textContent = q.label;
  document.getElementById('q-count').textContent = `${idx + 1} / ${total}`;
  document.getElementById('prog-fill').style.width = pct + '%';

  // build element
  const wrap = document.createElement('div');
  wrap.className = 'q-wrap entering';
  wrap.innerHTML = `
    <p class="q-text">${q.q}</p>
    <div class="options">
      <button class="opt-btn" onclick="answer(0)">
        <span>${q.a}</span><span class="arrow">→</span>
      </button>
      <button class="opt-btn" onclick="answer(1)">
        <span>${q.b}</span><span class="arrow">→</span>
      </button>
    </div>`;

  document.getElementById('quiz-body').appendChild(wrap);

  // trigger transition in
  requestAnimationFrame(() => requestAnimationFrame(() => {
    wrap.classList.remove('entering');
    wrap.classList.add('active');
  }));

  curWrap = wrap;
}

/* ────────────────────────────────────────
   ANSWER
──────────────────────────────────────── */
function answer(choice) {
  // disable buttons to prevent double-tap
  curWrap.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  answers.push(choice);
  const old = curWrap;
  old.classList.remove('active');
  old.classList.add('leaving');
  curIdx++;

  if (curIdx >= QS.length) {
    setTimeout(() => { old.remove(); showResult(); }, 340);
    return;
  }
  setTimeout(() => { old.remove(); renderQ(curIdx); }, 340);
}

/* ────────────────────────────────────────
   CALC TYPE
──────────────────────────────────────── */
function calcType() {
  // count A (0) answers per axis (4 questions each)
  const foodA = answers.slice(0, 4).filter(x => x === 0).length;
  const moveA = answers.slice(4, 8).filter(x => x === 0).length;
  const fatA  = answers.slice(8,12).filter(x => x === 0).length;
  const strA  = answers.slice(12,16).filter(x => x === 0).length;

  const f = foodA >= 2 ? 'F' : 'E';   // 食：F乱れ / E整い
  const m = moveA >= 2 ? 'S' : 'A';   // 動：S少 / A多
  const t = fatA  >= 2 ? 'T' : 'R';   // 疲：T高 / R低
  const s = strA  >= 2 ? 'H' : 'L';   // スト：H高 / L低

  return `${f}${m}${t}${s}`;
}

/* ────────────────────────────────────────
   SHOW RESULT
──────────────────────────────────────── */
function showResult() {
  const code = calcType();
  lastCode = code;
  const t = TYPES[code] || TYPES['ESTL'];

  // fill DOM
  document.getElementById('r-code').textContent = code;
  document.getElementById('r-name').textContent = t.name;
  document.getElementById('r-short').textContent = t.short;
  document.getElementById('r-reason').textContent = t.reason;
  document.getElementById('r-message').textContent = t.message;
  document.getElementById('r-menu').textContent = t.menu;
  document.getElementById('r-menu-note').textContent = t.menuNote;
  document.getElementById('r-supp').textContent = t.supp;

  // axis chips
  const axesEl = document.getElementById('r-axes');
  axesEl.innerHTML = '';
  (t.axes || []).forEach(ax => {
    const chip = document.createElement('span');
    chip.className = 'axis-result-chip' + (ax.neg ? ' negative' : '');
    chip.textContent = ax.label;
    axesEl.appendChild(chip);
  });

  // progress to 100%
  document.getElementById('prog-fill').style.width = '100%';

  showScreen('result');

  // staggered reveal
  const revs = document.querySelectorAll('#result .reveal');
  revs.forEach((el, i) => {
    el.classList.remove('in');
    setTimeout(() => el.classList.add('in'), i * 110 + 200);
  });
}

/* ────────────────────────────────────────
   SHARE
──────────────────────────────────────── */
function onShare() {
  const t = TYPES[lastCode] || {};
  const text = `私のCOREタイプは「${t.name || ''}」でした。\n${t.short || ''}\n\n▶ VISUAL LABO COREタイプ診断\n#VISUALLABO #COREタイプ診断 #新橋`;
  if (navigator.share) {
    navigator.share({ title: 'COREタイプ診断 | VISUAL LABO', text });
  } else {
    navigator.clipboard.writeText(text)
      .then(() => alert('コピーしました！SNSに貼り付けてシェアしてください。'))
      .catch(() => alert(text));
  }
}

/* ────────────────────────────────────────
   RETRY
──────────────────────────────────────── */
function onRetry() {
  document.querySelectorAll('#result .reveal').forEach(el => el.classList.remove('in'));
  startQuiz();
}
